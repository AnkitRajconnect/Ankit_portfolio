backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "projects"
    label: "Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", hint: "e.g. Brand Strategy · Go-to-Market" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Case Study Link", name: "link", widget: "string", required: false, hint: "e.g. case-beealp.html" }
      - { label: "Featured", name: "featured", widget: "boolean", default: true }
      - { label: "Order", name: "order", widget: "number", default: 1, hint: "Lower number = shows first" }
